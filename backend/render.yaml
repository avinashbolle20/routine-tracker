services:
  - type: web
    name: routine-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn run:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: routine-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://routine-tracker-bhsw.onrender.com

databases:
  - name: routine-db
    databaseName: routine
    user: routine_user